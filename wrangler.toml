name = "mail"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "61714072-b8d1-4be8-9fd7-bc4fd97a6e67" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="youfak"
ADMIN_PASSWORD="19960802lin"
GUEST_PASSWORD="guest"
JWT_TOKEN="dd03a59a54f14de68f711e8738c327d9"
JWT_TOKENGUEST_PASSWORD="80b513e9686a4107aee1c10c3228a1b3"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="youfak.edu.kg,mundodedicas.com,youfak.online,youfak.ccwu.cc"
RESEND_API_KEY="3a8d30963ee74caca20a2980fb8d62bc"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

